name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug key
        run: |
          echo "Key starts with: ${{ secrets.SSH_KEY | slice: 0, 30 }}"
          echo "Key length: ${{ secrets.SSH_KEY | size }}"