server {
    listen 80;
    listen [::]:80;
    server_name lesterasia.com www.lesterasia.com;

    root /var/www/lesterasia.com/public;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /404.html {
        internal;
    }

    error_page 404 /404.html;
}

